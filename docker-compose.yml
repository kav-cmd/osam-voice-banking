version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - JWT_SECRET=change-this-to-a-secure-random-string
      - PHONE_ENCRYPT_KEY=change-this-to-a-fernet-key
      - DATABASE_URL=sqlite:///./osam.db
    volumes:
      - osam_data:/app

volumes:
  osam_data:

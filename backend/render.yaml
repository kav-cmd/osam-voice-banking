services:
  - type: web
    name: osam-voice-banking
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8002"
      - key: PYTHON_VERSION
        value: "3.11"
